<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Taiwan Live Map</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff4757; --bg: #0f1116; --g: rgba(255, 255, 255, 0.1); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Outfit'; background: var(--bg); color: white; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .overlay { position: absolute; top: 15px; left: 15px; z-index: 1000; width: 280px; max-height: calc(100vh - 30px); background: rgba(15,17,22,0.9); backdrop-filter: blur(10px); border-radius: 15px; padding: 15px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin: 0; font-size: 18px; color: var(--p); }
        .search { width: 100%; padding: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--g); border-radius: 8px; color: white; margin: 10px 0; outline: none; }
        .list { flex-grow: 1; overflow-y: auto; }
        .item { padding: 8px; border-bottom: 1px solid var(--g); cursor: pointer; }
        .tag { display: inline-block; padding: 2px 5px; font-size: 9px; background: #57606f; border-radius: 4px; margin-top: 3px; }
        .tag-taipei { background: #57606f; } .tag-kaohsiung { background: #ffa502; } .tag-alishan { background: #2ed573; }
        .leaflet-popup-content-wrapper { background: #0f1116; color: white; border-radius: 8px; }
        .leaflet-popup-tip { background: #0f1116; }
        ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: var(--g); }
    </style></head>
    <body><div class="overlay"><h1>???? Taiwan Travel Map</h1><p style="font-size: 10px; color: #aaa;">Sync : 15:35</p>

(Taroko National Park)", "city": "Taïwan", "coords": [24.1591, 121.62141], "desc": "ATTENTION FERME DEPUIS FIN 2025 SUITE TREMBLEMENT DE TERRE\n\nTaroko Gorge est l’un des joyaux naturels de Taïwan : un canyon de marbre impressionnant s"}, {"name": "[Taïpei] Elephant Mountain (Xiangshan)", "city": "Taïpei", "coords": [25.0331314, 121.5677202], "desc": "Elephant Mountain (Xiangshan) est l’un des sentiers les plus accessibles pour obtenir une vue spectaculaire sur Taipei, notamment sur le Taipei 101 et"}, {"name": "[Taïpei] Taipei 101", "city": "Taïpei", "coords": [25.03352416448, 121.56460396087], "desc": "Taipei 101 est le gratte-ciel le plus emblématique de Taïwan. Avec ses 508 mètres de haut et 101 étages, il fut le plus haut bâtiment du monde de 2004"}, {"name": "[Taïpei] Pingxi (Old Street)", "city": "Taïpei", "coords": [25.024799986288, 121.73862802877], "desc": "Pingxi est une petite ville dans le nord de Taïwan réputée pour ses ruelles anciennes, ses maisons en bois datant de l’époque coloniale japonaise, et "}, {"name": "[Taïpei] Jiufen (village aux lanternes)", "city": "Taïpei", "coords": [25.107210386035, 121.84241044097], "desc": "Jiufen est un village pittoresque perché dans les collines du nord de Taïwan, non loin de la côte. Il est célèbre pour ses ruelles étroites pavées, se"}, {"name": "[Taïpei] Marché de nuit (Shilin / Raohe)", "city": "Taïpei", "coords": [25.087957752444, 121.524165888095], "desc": "Les marchés de nuit de Taipei sont une expérience culinaire et culturelle unique. Shilin est le plus grand, avec une infinité de stands de street food"}, {"name": "[Taïpei] Shifen Old Street", "city": "Taïpei", "coords": [25.042416986563, 121.776265959151], "desc": "Shifen Old Street est un lieu emblématique du Pingxi Line : une rue historique où le chemin de fer passe à travers le village, entourée de magasins de"}, {"name": "Lungshan Temple", "city": "Taïpei", "coords": [25.036778564116, 121.499935482396], "desc": "Le Lungshan Temple, aussi appelé Mengjia Lungshan, est l’un des temples les plus anciens et les plus emblématiques de Taipei. Fondé en 1738 par des mi"}, {"name": "Otherworld ", "city": "Taïwan", "coords": [23.590930913777, 120.526042546211], "desc": "Situé dans le canton de Dalin, dans le comté de Chiayi, le Château de Rêve d'Olevoo est un parc à thème immersif alliant architecture, sculpture et cu"}, {"name": "Yonghe Baofu Temple", "city": "Taïpei", "coords": [25.012931001844, 121.508783000293], "desc": "Le Yonghe Baofu Temple (永和保福宮) est un temple local discret mais très significatif, situé en plein cœur d’un quartier urbain dense, entouré de bâtiment"}, {"name": "[Taïpei] Yehliu Geopark", "city": "Taïpei", "coords": [25.205437082427, 121.690023300094], "desc": "Yehliu est une péninsule située dans le district de Wanli, au nord de Taïwan, célèbre pour son geoparc côtier aux formations rocheuses spectaculaires."}, {"name": "[Kaohsiung] Yancheng (rues historiques)", "city": "Kaohsiung", "coords": [22.6252073, 120.2835772], "desc": "Yancheng est l’un des quartiers historiques de Kaohsiung, situé près du port et de la Love River. Ancien centre commercial et culturel de la ville ava"}, {"name": "Dihua Street", "city": "Taïpei", "coords": [25.061950488514, 121.50920000325], "desc": "Dihua Street est l’axe historique du quartier de Dadaocheng, ancien cœur commercial de Taipei aux XIXᵉ et début XXᵉ siècles. Longue rue bordée d’entre"}, {"name": "[Kaohsiung] Shoushan Monkey Mountain", "city": "Kaohsiung", "coords": [22.655797420375, 120.27492770938], "desc": "Shoushan Monkey Mountain, ou Shoushan National Nature Park est une montagne en pleine ville qui abrite une forêt subtropicale sèche unique, couvrant e"}, {"name": "[Kaohsiung] Ruifeng Night Market", "city": "Kaohsiung", "coords": [22.665620319274, 120.305953880631], "desc": "Le Ruifeng Night Market est un marché de nuit très populaire situé dans le district de Zuoying, à Kaohsiung. Réputé pour son ambiance animée et sa gra"}, {"name": "Jiaoxi - Ville sources eau chaude", "city": "Taïwan", "coords": [24.8125615, 121.7395053], "desc": "Jiaoxi est une petite ville thermale située dans le comté de Yilan, réputée pour ses sources d’eau chaude naturelles accessibles directement en ville."}, {"name": "[Taïpei] Dalongdong Bao’an temple", "city": "Taïpei", "coords": [25.073105690569, 121.515553482583], "desc": "Le Dalongdong Bao’an Temple est l’un des temples les plus raffinés et artistiquement remarquables de Taipei. Fondé au début du XIXᵉ siècle par des mig"}, {"name": "[Kaohsiung] Luhe Night Market", "city": "Kaohsiung", "coords": [22.632477992868, 120.3003315724], "desc": "Liuhe Night Market est l’un des marchés de nuit les plus connus de Kaohsiung, situé en plein centre-ville. Plus organisé et linéaire que d’autres marc"}, {"name": "[Taïpei] Hot Dog Toyz", "city": "Taïpei", "coords": [25.042355418021, 121.549581458945], "desc": "Art Toys ( Bearbricks)"}, {"name": "[Taïpei] Paradise ToyLand", "city": "Taïpei", "coords": [25.043543598169, 121.552744741343], "desc": "Magasin emblématique de jouets de créateurs et d'art toys fondé en 2005. Paradise ToyLand importe des collections uniques du Japon, de Hong Kong et d'"}];
        const list = document.getElementById('l');
        data.forEach(x => {
            const m = L.circleMarker(x.coords, { radius: 6, fillColor: color[x.city] || "red", color: "white", weight: 1, fillOpacity: 0.8 }).addTo(map);
            m.bindPopup("<strong>"+x.name+"</strong><br><small>"+x.desc+"</small>");
            const div = document.createElement('div'); div.className = 'item';
            div.innerHTML = "<div>"+x.name+"</div><span class='tag tag-"+x.city.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '')+"'>"+x.city+"</span>";
            div.onclick = () => { map.flyTo(x.coords, 14); m.openPopup(); }; list.appendChild(div);
        });
        document.getElementById('s').oninput = (e) => {
            const v = e.target.value.toLowerCase();
            document.querySelectorAll('.item').forEach(i => { i.style.display = i.innerText.toLowerCase().includes(v) ? 'block' : 'none'; });
        };
    </script></body></html>
